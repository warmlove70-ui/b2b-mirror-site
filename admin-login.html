<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ZEKSmart Admin Login</title>
  <script>
    async function login() {
      document.getElementById('status').textContent = '正在登录...';
      
      try {
        const response = await fetch('https://b2b-mirror-site.vercel.app/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: 'ZekSmart2026!' }),
          credentials: 'include',
        });
        
        const data = await response.json();
        
        if (data.ok) {
          document.getElementById('status').textContent = '登录成功！正在跳转...';
          document.getElementById('status').style.color = 'green';
          
          // 设置 Cookie 后跳转
          window.location.href = 'https://b2b-mirror-site.vercel.app/admin/leads';
        } else {
          document.getElementById('status').textContent = '登录失败：' + (data.error || '未知错误');
          document.getElementById('status').style.color = 'red';
        }
      } catch (err) {
        document.getElementById('status').textContent = '错误：' + err.message;
        document.getElementById('status').style.color = 'red';
      }
    }
    
    // 页面加载后自动登录
    window.onload = login;
  </script>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding: 50px;">
  <h1>ZEKSmart Admin Login</h1>
  <p id="status">正在自动登录...</p>
  <p><a href="https://b2b-mirror-site.vercel.app/admin/leads" target="_blank">如果 3 秒后没有跳转，请点击这里</a></p>
</body>
</html>
